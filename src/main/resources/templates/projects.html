<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>Proyectos | Julián Gómez Fernández</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .project-card {
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .badge {
            font-size: 0.85rem;
            padding: 8px 12px;
        }

        body {
            background: linear-gradient(to bottom right, #a8edea, #fed6e3);
            min-height: 100vh;
        }

        .project-container {
            max-width: 1200px;
            margin: 40px auto;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Julián Gómez Fernández</a>
    
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">CV</a>
                <a class="nav-link active" href="/projects">Proyectos</a>
                <a class="nav-link" href="https://github.com/jgf78" target="_blank">
                    GitHub
                </a>
                <a class="nav-link" href="https://www.linkedin.com/in/juliangomezfdez/" target="_blank">
                    Linkedin
                </a>
            </div>
        </div>
    </nav>
<div class="container project-container">

    <h2 class="mb-4 fw-bold">Mis Proyectos</h2>

    <div class="row g-4">

        <div class="col-md-6 col-lg-4"
             th:each="project : ${projects.projects}">

            <div class="card h-100 border-0 shadow project-card">

                <div class="card-body d-flex flex-column">

                    <h4 class="mb-2 fw-bold"
                        th:text="${project.name}">
                    </h4>

                    <p class="text-muted mb-2"
                       th:text="${project.description}">
                    </p>

                    <div class="mb-2">
					    <ul class="list-unstyled mb-0">
					        <li th:each="feat : ${project.features}"
					            class="feature-item"
					            th:text="${feat}">
					        </li>
					    </ul>
					</div>
                    
                    <div class="mb-3">
                        <span class="badge bg-dark me-1 mb-1"
                              th:each="tech : ${project.technologies}"
                              th:text="${tech}">
                        </span>
                    </div>

                    <a class="btn btn-outline-dark w-100 mt-auto"
                       th:href="${project.github}"
                       target="_blank">
                        Ver en GitHub <i class="bi bi-github"></i>
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
