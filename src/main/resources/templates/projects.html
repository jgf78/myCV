<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title th:text="#{projects.page.title} + ' | Julián Gómez Fernández'">
    Proyectos | Julián Gómez Fernández
</title>

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

<link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

/* =========================
   LIGHT MODE BASE
========================= */

body {
    background: linear-gradient(to bottom right, #a8edea, #fed6e3);
    min-height: 100vh;
    overflow-x: hidden;
    color: #212529;
}

.project-container {
    max-width: 1400px;
    margin: 40px auto;
}

.project-card {
    border-radius: 20px;
    transition: all 0.3s ease;
    background: #ffffff;
    color: #212529;
}

.project-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}

.card-body {
    padding: 1.5rem;
}

.badge {
    font-size: 0.85rem;
    padding: 8px 12px;
}

.feature-item {
    margin-bottom: 6px;
    line-height: 1.4;
    color: #495057;
}

.project-card h4 {
    color: #212529;
}

.project-card p {
    font-size: 0.95rem;
    line-height: 1.5;
}

.btn-outline-dark {
    border-radius: 10px;
}

.navbar-brand {
    white-space: nowrap;
}

a {
    transition: all 0.2s ease;
}

a:hover {
    opacity: 0.85;
}

/* =========================
   RESPONSIVE
========================= */

@media (max-width: 991px) {

    .navbar-nav {
        padding-top: 10px;
    }

    .nav-link {
        padding: 10px 0;
        font-size: 1.05rem;
    }
}

@media (max-width: 768px) {

    .project-container {
        padding: 15px;
    }

    .project-card {
        border-radius: 15px;
    }

    .card-body {
        padding: 1.2rem;
    }

    h2 {
        font-size: 1.8rem;
    }

    h4 {
        font-size: 1.2rem;
    }

    .badge {
        font-size: 0.75rem;
        padding: 6px 10px;
    }
}

@media (max-width: 576px) {
    .navbar-brand {
        font-size: 1rem;
    }
}

/* =========================
   DARK MODE AUTOMÁTICO
========================= */

@media (prefers-color-scheme: dark) {

    body {
        background: linear-gradient(to bottom right, #0f172a, #111827);
        color: #e5e7eb;
    }

    .project-card {
        background: #1f2937;
        color: #e5e7eb;
    }

    .project-card h4 {
        color: #f9fafb;
    }

    .project-card p {
        color: #cbd5e1;
    }

    .feature-item {
        color: #cbd5e1;
    }

    .text-muted {
        color: #9ca3af !important;
    }

    h2 {
        color: #f9fafb;
    }

    hr {
        border-color: #374151;
    }

    .btn-outline-dark {
        color: #e5e7eb;
        border-color: #e5e7eb;
    }

    .btn-outline-dark:hover {
        background: #e5e7eb;
        color: #111827;
    }
}

</style>
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid px-3 px-md-4 project-container">

    <h2 class="mb-4 fw-bold"
	    th:text="#{projects.title}">
	    Mis Proyectos
	</h2>

    <div class="row g-4">

        <div class="col-12 col-md-6 col-xl-4"
             th:each="project : ${projects.projects}">

            <div class="card h-100 border-0 shadow project-card">

                <div class="card-body d-flex flex-column">

                    <h4 class="mb-2 fw-bold"
                        th:text="${project.name}">
                    </h4>

                    <p class="text-muted mb-3"
                       th:text="${project.description}">
                    </p>

                    <div class="mb-3">

                        <ul class="list-unstyled mb-0">

                            <li th:each="feat : ${project.features}"
                                class="feature-item"
                                th:text="${feat}">
                            </li>

                        </ul>

                    </div>

                    <div class="mb-3">

                        <span class="badge bg-dark me-1 mb-1"
                              th:each="tech : ${project.technologies}"
                              th:text="${tech}">
                        </span>

                    </div>

                    <a class="btn btn-outline-dark w-100 mt-auto"
					   th:href="${project.github}"
					   target="_blank">
					
					    <span th:text="#{projects.github}">
					        Ver en GitHub
					    </span>
					
					    <i class="bi bi-github"></i>
					
					</a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
