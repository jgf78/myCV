<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login | Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>

/* =========================
   BASE LIGHT MODE
========================= */

body {
    background: linear-gradient(to bottom right, #a8edea, #fed6e3);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* =========================
   LOGIN CARD
========================= */

.login-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-card {
    width: 100%;
    max-width: 420px;
    border-radius: 20px;
    border: none;
    background: #ffffff;
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    padding: 30px;
    transition: all 0.3s ease;
}

.login-card:hover {
    transform: translateY(-4px);
}

.login-title {
    font-weight: bold;
    margin-bottom: 20px;
    text-align: center;
}

.form-control {
    border-radius: 10px;
    padding: 10px 12px;
}

.btn-login {
    border-radius: 10px;
    padding: 10px;
    font-weight: 600;
}

/* =========================
   DARK MODE
========================= */

@media (prefers-color-scheme: dark) {

    body {
        background: linear-gradient(to bottom right, #0f172a, #111827);
        color: #e5e7eb;
    }

    .login-card {
        background: #1f2937;
        color: #e5e7eb;
        box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    }

    .form-control {
        background: #111827;
        border: 1px solid #374151;
        color: #e5e7eb;
    }

    .form-control::placeholder {
        color: #9ca3af;
    }

    .btn-outline-dark {
        color: #e5e7eb;
        border-color: #e5e7eb;
    }

    .btn-outline-dark:hover {
        background: #e5e7eb;
        color: #111827;
    }
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            Julián Gómez Fernández
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <div class="navbar-nav ms-auto">

                <a class="nav-link" href="/">CV</a>

                <a class="nav-link" href="/projects">Proyectos</a>

                <a class="nav-link"
                   href="https://github.com/jgf78"
                   target="_blank"
                   rel="noopener noreferrer">

                    <i class="bi bi-github me-1"></i>
                    GitHub
                </a>

                <a class="nav-link"
                   href="https://www.linkedin.com/in/juliangomezfdez/"
                   target="_blank"
                   rel="noopener noreferrer">

                    <i class="bi bi-linkedin me-1"></i>
                    LinkedIn
                </a>
                <a class="nav-link  active" href="/login">
                    <i class="bi bi-lock me-1"></i> Admin
                </a>
                
                <div class="dropdown ms-2">

					    <button class="btn btn-outline-light btn-sm dropdown-toggle"
					            type="button"
					            data-bs-toggle="dropdown">
					    
					        🌐
					    </button>
					
					    <ul class="dropdown-menu dropdown-menu-end">
					
					        <li>
					            <a class="dropdown-item"
								   href="/login?lang=es">
								   <img src="/images/es.jpg" width="20"> Español
								</a>
					        </li>
					
					        <li>
					            <a class="dropdown-item"
								   href="/login?lang=en">
								    <img src="/images/en.jpg" width="20"> English
								</a>
					        </li>
					
					    </ul>
					
					</div>

            </div>

        </div>

    </div>

</nav>

<!-- LOGIN -->
<div class="login-container">

    <div class="login-card">

        <h3 class="login-title">
		    <i class="bi bi-lock-fill me-2"></i>
		    <span th:text="#{login.title}">Admin Login</span>
		</h3>

		<div th:if="${param.error}"
		     class="alert alert-danger text-center">
		
		    <i class="bi bi-exclamation-triangle me-1"></i>
		    <span th:text="#{login.error}">
			    Usuario o contraseña incorrectos
			</span>
		
		</div>

        <form method="post" action="/auth/login">

            <div class="mb-3">
                <label class="form-label" th:text="#{login.username}">Usuario</label>
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="admin"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label" th:text="#{login.password}">Contraseña</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="••••••••"
                       required>
            </div>

            <button class="btn btn-dark w-100 btn-login" type="submit">

			    <span th:text="#{login.button}">
			        Entrar
			    </span>
			
			    <i class="bi bi-box-arrow-in-right ms-1"></i>
			
			</button>

        </form>

        <div class="text-center mt-3">
            <a href="/" class="text-muted small"
			   th:text="#{login.back}">
			    Volver al CV
			</a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
