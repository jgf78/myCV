<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: linear-gradient(to right, #0f172a, #1e293b);
    color: white;
    min-height: 100vh;
}

.box {
    max-width: 1200px;
    margin: 80px auto;
    padding: 40px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.layout {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.left {
    flex: 2;
    min-width: 500px;
}

.right {
    flex: 1;
    min-width: 350px;
    background: rgba(255, 255, 255, 0.05);
    padding: 20px;
    border-radius: 15px;
}

.stats {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 20px;
    margin-bottom: 30px;
}

.stat-card {
    flex: 1;
    min-width: 200px;
    background: rgba(255, 255, 255, 0.08);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.stat-number {
    font-size: 2rem;
    font-weight: bold;
}

table {
    font-size: 0.85rem;
}

.table-container {
    margin-top: 25px;
    background: rgba(255, 255, 255, 0.05);
    padding: 15px;
    border-radius: 15px;
}

.chart-buttons {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

#dailyVisitsChart {
    background: white;
    border-radius: 12px;
    padding: 10px;
}
</style>
</head>

<body>

<div class="box">

    <h1>🔥 Admin Dashboard</h1>

    <p class="mt-3">Panel de control de visitas y actividad del sitio</p>

    <!-- 📊 STATS -->
    <div class="stats">

        <div class="stat-card">
            <div>Total visitas</div>
            <div class="stat-number" th:text="${totalVisits}">0</div>
        </div>

        <div class="stat-card">
            <div>Últimas rutas visitadas</div>
            <div class="stat-number" th:text="${lastVisits.size()}">0</div>
        </div>

    </div>
    
	<!-- 📈 VISITAS DIARIAS -->
	<div class="table-container mb-4">
	
	    <div class="d-flex justify-content-between align-items-center mb-3">
	
	        <h5 class="mb-0">📈 Visitas diarias del mes actual</h5>
	
	        <button class="btn btn-sm btn-outline-primary"
	                onclick="loadDailyVisits()">
	            🔄 Recargar
	        </button>
	
	    </div>
	
	    <canvas id="dailyVisitsChart" height="90"></canvas>
	
	</div>

    <!-- LAYOUT -->
    <div class="layout">

        <!-- LEFT -->
        <div class="left">

            <div class="table-container">

                <h5 class="mb-3">📍 Últimas rutas visitadas</h5>

                <div class="table-responsive">

                    <table class="table table-dark table-striped table-hover">

                        <thead>
                            <tr>
                                <th>Ruta</th>
                                <th>IP</th>
                                <th>País</th>
                                <th>Ciudad</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="v : ${lastVisits}">
                                <td th:text="${v.path}"></td>
                                <td th:text="${v.ip}"></td>

                                <td>
                                    <img th:src="@{'https://flagcdn.com/24x18/' + ${#strings.toLowerCase(v.country)} + '.png'}"
                                        width="24"
                                        class="me-2"
                                        alt="flag" />
                                    <span th:text="${v.country}"></span>
                                </td>

                                <td th:text="${v.city}"></td>

                                <td th:text="${#temporals.format(v.visitTime, 'dd/MM/yyyy HH:mm:ss')}"></td>
                            </tr>
                        </tbody>

                    </table>

                </div>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="right">

            <!-- 🌍 COUNTRY -->
            <h5>🌍 Visitas por país</h5>

            <canvas id="countryChart"></canvas>

            <div class="chart-buttons">
                <button class="btn btn-outline-light btn-sm" onclick="loadTotal()">Total</button>
                <button class="btn btn-outline-light btn-sm" onclick="loadMonthly()">Mensual</button>
            </div>

            <hr class="text-light">

            <!-- 🍩 DEVICE DONUT -->
            <h5>📱 Dispositivos</h5>

            <canvas id="deviceChart"></canvas>

        </div>

    </div>

    <!-- LOGOUT -->
    <div class="mt-4 text-center">
        <button class="btn btn-outline-light" onclick="logout()">
            Logout
        </button>
    </div>

</div>

<script>

let chart;
let deviceChart;
let dailyVisitsChart;

/* =========================
   🌍 COUNTRY CHART
========================= */

function renderChart(data) {

    const labels = data.map(d => d.country);
    const values = data.map(d => d.visits);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("countryChart"), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Visitas',
                data: values,
                backgroundColor: 'rgba(59, 130, 246, 0.6)'
            }]
        },
        options: {
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

async function loadTotal() {
    const res = await fetch('/admin/api/countries');
    const data = await res.json();
    renderChart(data);
}

async function loadMonthly() {
    const res = await fetch('/admin/api/countries/month');
    const data = await res.json();
    renderChart(data);
}

/* =========================
   🍩 DEVICE DONUT
========================= */

function renderDeviceChart(data) {

    const labels = data.map(d => d.device);
    const values = data.map(d => d.visits);

    if (deviceChart) deviceChart.destroy();

    deviceChart = new Chart(document.getElementById("deviceChart"), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: [
                    '#3b82f6', // desktop
                    '#10b981', // mobile
                    '#f59e0b'  // tablet
                ],
                borderWidth: 0
            }]
        },
        options: {
            plugins: {
                legend: {
                    labels: {
                        color: 'white'
                    }
                }
            }
        }
    });
}

async function loadDevices() {
    const res = await fetch('/admin/api/devices');
    const data = await res.json();
    renderDeviceChart(data);
}

/* =========================
   LOGOUT
========================= */

function logout() {
    localStorage.removeItem("jwt");
    window.location.href = "/login";
}

/* =========================
   INIT
========================= */

loadTotal();
loadDevices();
loadDailyVisits();

/* =========================
   📈 DAILY VISITS
========================= */

function renderDailyVisitsChart(data) {

    const labels = data.map(d => d.day);
    const values = data.map(d => d.visits);

    if (dailyVisitsChart) {
        dailyVisitsChart.destroy();
    }

    dailyVisitsChart = new Chart(
        document.getElementById("dailyVisitsChart"),
        {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Visitas',
                    data: values,
                    borderColor: '#dc2626',
                    backgroundColor: '#dc2626',
                    pointBackgroundColor: '#dc2626',
                    pointBorderColor: '#dc2626',
                    pointRadius: 5,
                    borderWidth: 3,
                    tension: 0.3,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#000'
                        }
                    },
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: '#000'
                        }
                    }
                }
            }
        }
    );
}

async function loadDailyVisits() {

    const res = await fetch('/admin/api/visits/daily');

    const data = await res.json();

    renderDailyVisitsChart(data);
}

</script>

</body>
</html>
