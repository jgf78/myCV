<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
        }

        .box {
            max-width: 900px;
            margin: 80px auto;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 2.5rem;
        }

        .badge {
            font-size: 1rem;
        }

        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            min-width: 200px;
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }

        table {
            font-size: 0.85rem;
        }

        .table-container {
            margin-top: 25px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>🔥 Admin Dashboard</h1>

    <p class="mt-3">
        Panel de control de visitas y actividad del sitio
    </p>

    <!-- 📊 STATS -->
    <div class="stats">

        <div class="stat-card">
            <div>Total visitas</div>
            <div class="stat-number" th:text="${totalVisits}">0</div>
        </div>

        <div class="stat-card">
            <div>Últimas rutas visitadas</div>
            <div class="stat-number" th:text="${lastVisits.size()}">0</div>
        </div>

    </div>

    <!-- 📍 TABLE -->
    <div class="table-container">

        <h5 class="mb-3">📍 Últimas rutas visitadas</h5>

        <div class="table-responsive">

            <table class="table table-dark table-striped table-hover">

                <thead>
                    <tr>
                        <th>Ruta</th>
                        <th>IP</th>
                        <th>País</th>
                        <th>Ciudad</th>
                        <th>Fecha</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="v : ${lastVisits}">

                        <td th:text="${v.path}"></td>
                        <td th:text="${v.ip}"></td>
                        <td>
						    <img th:src="@{'https://flagcdn.com/24x18/' + ${#strings.toLowerCase(v.country)} + '.png'}"
						         width="24"
						         class="me-2"
						         alt="flag"/>
						    <span th:text="${v.country}"></span>
						</td>
                        <td th:text="${v.city}"></td>
                        <td th:text="${#temporals.format(v.visitTime, 'dd/MM/yyyy HH:mm:ss')}"></td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

    <!-- 🔒 LOGOUT -->
    <div class="mt-4 text-center">

        <button class="btn btn-outline-light" onclick="logout()">
            Logout
        </button>

    </div>

</div>

<script>
function logout() {
    localStorage.removeItem("jwt");
    window.location.href = "/login";
}
</script>

</body>
</html>
